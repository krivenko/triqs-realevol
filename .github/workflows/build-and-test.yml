name: Build and test

on:
  push:
    branches:
      - master
      - ci
  pull_request:
    branches:
      - master
  schedule:
    - cron: '0 0 * * 0'

jobs:

  #
  # Ubuntu
  #

  ubuntu:
    name: Ubuntu
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler:
          - { name: "gcc", cc: "gcc-14", cxx: "g++-14" }
          - { name: "clang", cc: "clang", cxx: "clang++" }

    steps:
    - uses: actions/checkout@v6

    - name: Update apt-get cache
      run: sudo apt-get update

    - name: Install APT dependencies
      run: >
        sudo apt-get install lsb-release wget software-properties-common &&
        sudo apt-get install
        libomp5
        libomp-dev
        openmpi-bin
        openmpi-common
        openmpi-doc
        libopenmpi-dev
        libboost-dev
        libblas-dev
        liblapack-dev
        libfftw3-dev
        libgmp-dev
        hdf5-tools
        libhdf5-dev
        python3-dev
        python3-numpy
        python3-scipy
        python3-matplotlib
        ipython3
        python3-mpi4py
        python3-mako

    - name: Build & Install ARPACK-NG
      env:
        FC: gfortran-14
      run: |
        git clone https://github.com/opencollab/arpack-ng.git
        pushd arpack-ng
        cmake . -DBUILD_SHARED_LIBS=ON -DCMAKE_INSTALL_PREFIX=$HOME/install
        make -j2 install VERBOSE=1
        popd

    - name: Build & install TRIQS
      env:
        CC: ${{ matrix.compiler.cc }}
        CXX: ${{ matrix.compiler.cxx }}
      run: |
        git clone https://github.com/TRIQS/triqs --branch 3.3.x
        mkdir triqs/build && pushd triqs/build
        cmake ..                                                               \
          -DCMAKE_BUILD_TYPE=Debug                                             \
          -DCMAKE_INSTALL_PREFIX=$HOME/install                                 \
          -DBuild_Tests=OFF
        make -j2 install VERBOSE=1
        popd

    - name: Build realevol
      env:
        CC: ${{ matrix.compiler.cc }}
        CXX: ${{ matrix.compiler.cxx }}
      run: |
        source $HOME/install/share/triqs/triqsvars.sh
        mkdir build && pushd build
        cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/install                          \
                 -Darpack-ng_DIR=$HOME/install/lib/cmake/arpackng
        make -j2 install VERBOSE=1
        popd

    - name: Test realevol
      run: |
        sudo sh -c 'echo -e "\nrmaps_base_oversubscribe = 1" >>                \
          /etc/openmpi/openmpi-mca-params.conf'
        pushd build
        source $HOME/install/share/triqs/triqsvars.sh
        ctest --output-on-failure
        popd

  #
  # macOS
  #

  macos:
    name: macOS
    strategy:
      matrix:
        os:
          - "macos-latest"
          # macos-15-intel is probably the last supported macOS x86-64 runner
          # https://github.com/actions/runner-images/issues/13074
          - "macos-15-intel"
        compiler:
          # NB: With gcc-15, unit tests segfault
          # in exprtk::parser::init_precompilation()
          - { name: "clang", cc: "clang", cxx: "clang++" }
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Update Homebrew formulae
      run: brew update

    - name: Install Homebrew dependencies
      run: |
           brew install llvm libomp open-mpi boost fftw hdf5 numpy scipy mpi4py

    - name: Install Python dependencies
      run: |
           PYTHON_BIN="$(python -c 'import site; print(site.USER_BASE)')/bin"
           echo "PATH=${PYTHON_BIN}:${PATH}" >> $GITHUB_ENV
           pip install --user --upgrade pip
           pip install --user mako

    - name: Set PATH and LDFLAGS for Clang
      if: matrix.compiler.name == 'clang'
      run: |
           PREFIX="$(brew --prefix llvm)"
           echo "PATH=${PREFIX}/bin:${PATH}" >> $GITHUB_ENV
           LDFLAGS="-L${PREFIX}/lib/c++ -L${PREFIX}/lib/unwind -lunwind"
           echo "LDFLAGS=${LDFLAGS}" >> $GITHUB_ENV

    - name: Build & Install ARPACK-NG
      env:
        FC: gfortran-15
      run: |
        git clone https://github.com/opencollab/arpack-ng.git
        pushd arpack-ng
        cmake . -DBUILD_SHARED_LIBS=ON -DCMAKE_INSTALL_PREFIX=$HOME/install
        make -j2 install VERBOSE=1
        popd

    - name: Build & install TRIQS
      env:
        CC: ${{ matrix.compiler.cc }}
        CXX: ${{ matrix.compiler.cxx }}
      run: |
        git clone https://github.com/TRIQS/triqs --branch 3.3.x
        mkdir triqs/build && pushd triqs/build
        cmake ..                                                               \
          -DCMAKE_BUILD_TYPE=Debug                                             \
          -DCMAKE_INSTALL_PREFIX=$HOME/install                                 \
          -DBuild_Tests=OFF
        make -j2 install VERBOSE=1
        popd

    - name: Build realevol
      env:
        CC: ${{ matrix.compiler.cc }}
        CXX: ${{ matrix.compiler.cxx }}
      run: |
        source $HOME/install/share/triqs/triqsvars.sh
        mkdir build && pushd build
        cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/install                          \
                 -Darpack-ng_DIR=$HOME/install/lib/cmake/arpackng
        make -j2 install VERBOSE=1
        popd

    - name: Test realevol
      env:
        TMPDIR: "/tmp"
      run: |
        mkdir -p $HOME/.prte
        echo -e "\nrmaps_default_mapping_policy = :oversubscribe" >> \
          $HOME/.prte/mca-params.conf
        pushd build
        source $HOME/install/share/triqs/triqsvars.sh
        ctest --output-on-failure
        popd
