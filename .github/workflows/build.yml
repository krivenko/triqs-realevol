name: build

on:
  push:
    branches:
      - master
      - ci
  pull_request:
    branches:
      - master
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:

    strategy:
      matrix:
        include:
          - {os: ubuntu-22.04, cc: gcc-10, cxx: g++-10}
          - {os: ubuntu-22.04, cc: clang-14, cxx: clang++-14}

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Update apt-get cache
      run: sudo apt-get update

    - name: Install Ubuntu dependencies
      run: >
        sudo apt-get install
        libboost-dev
        gfortran
        hdf5-tools
        libblas-dev
        libclang-14-dev
        libc++-14-dev
        libc++abi-14-dev
        libfftw3-dev
        libgfortran5
        libgmp-dev
        libhdf5-dev
        liblapack-dev
        libopenmpi-dev
        openmpi-bin
        openmpi-common
        openmpi-doc
        python3-clang-14
        python3-dev
        python3-mako
        python3-matplotlib
        python3-mpi4py
        python3-numpy
        python3-pip
        python3-scipy
        python3-sphinx
        python3-nbsphinx

    - name: Download Boost (a C++20 compatible version)
      run: |
           wget -q https://archives.boost.io/release/1.78.0/source/boost_1_78_0.tar.bz2
           tar -xf boost_1_78_0.tar.bz2
           mv boost_1_78_0 $HOME/boost

    - name: Build & Install ARPACK-NG
      run: |
        git clone https://github.com/opencollab/arpack-ng.git
        pushd arpack-ng
        cmake . -DBUILD_SHARED_LIBS=ON -DCMAKE_INSTALL_PREFIX=$HOME/install
        make -j2 install VERBOSE=1
        popd

    - name: Build & Install TRIQS
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      run: |
        git clone https://github.com/TRIQS/triqs --branch 3.1.x
        mkdir triqs/build && cd triqs/build
        cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/install \
                 -DBoost_INCLUDE_DIR=$HOME/boost \
                 -DBuild_Tests=OFF
        make -j2 install VERBOSE=1
        cd ../

    - name: Build realevol
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
        LIBRARY_PATH: /usr/local/opt/llvm/lib
      run: |
        source $HOME/install/share/triqs/triqsvars.sh
        mkdir build && pushd build
        cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/install \
                 -DBoost_INCLUDE_DIR=$HOME/boost \
                 -Darpack-ng_DIR=$HOME/install/lib/cmake/arpackng
        make -j2 install VERBOSE=1
        popd

    - name: Test realevol
      run: |
        sudo sh -c 'echo -e "\nrmaps_base_oversubscribe = 1" >> \
            /etc/openmpi/openmpi-mca-params.conf'
        source $HOME/install/share/triqs/triqsvars.sh
        cd build
        ctest --output-on-failure
