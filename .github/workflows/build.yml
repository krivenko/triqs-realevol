name: build

on:
  push:
    branches:
      - master
      - ci
  pull_request:
    branches:
      - master

jobs:
  build:

    strategy:
      matrix:
        include:
          - {os: ubuntu-20.04, cc: gcc-10, cxx: g++-10}
          - {os: ubuntu-20.04, cc: clang-11, cxx: clang++-11}

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v2

    - name: Update apt-get cache
      run: sudo apt-get update

    - name: Install ubuntu dependencies
      run: >
        sudo apt-get install
        clang-11
        g++-10
        gfortran
        hdf5-tools
        libblas-dev
        libboost-dev
        libclang-11-dev
        libc++-11-dev
        libc++abi-11-dev
        libfftw3-dev
        libgfortran4
        libgmp-dev
        libhdf5-dev
        liblapack-dev
        libopenmpi-dev
        openmpi-bin
        openmpi-common
        openmpi-doc
        python3-clang-11
        python3-dev
        python3-mako
        python3-matplotlib
        python3-mpi4py
        python3-numpy
        python3-pip
        python3-scipy
        python3-sphinx
        python3-nbsphinx

    - name: Build & Install ARPACK-NG
      run: |
        git clone https://github.com/opencollab/arpack-ng.git
        pushd arpack-ng
        cmake . -DBUILD_SHARED_LIBS=ON -DCMAKE_INSTALL_PREFIX=$HOME/install
        make -j2 install VERBOSE=1
        popd

    - name: Build & Install TRIQS
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      run: |
        git clone https://github.com/TRIQS/triqs --branch 3.0.x
        mkdir triqs/build && cd triqs/build
        cmake .. -DBuild_Tests=OFF -DCMAKE_INSTALL_PREFIX=$HOME/install
        make -j2 install VERBOSE=1
        cd ../

    - name: Build realevol
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
        LIBRARY_PATH: /usr/local/opt/llvm/lib
      run: |
        source $HOME/install/share/triqsvars.sh
        mkdir build && pushd build
        cmake .. -Darpack-ng_DIR=$HOME/install/lib/cmake -DCMAKE_INSTALL_PREFIX=$HOME/install
        make -j2 install VERBOSE=1
        popd

    - name: Test realevol
      run: |
        source $HOME/install/share/triqsvars.sh
        cd build
        ctest --output-on-failure
